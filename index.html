<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이대구 — 로그인</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <style>
    /* page-level override: 3-panel shell not used on login */
    body { background: var(--bg-base); }
  </style>
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-logo-area">
      <img src="assets/logo.svg" alt="메이대구 로고">
      <h1>메이대구</h1>
      <p>꽃집 주문 · 배송 관리 시스템</p>
    </div>

    <div class="login-card">
      <div class="login-tabs" id="login-tabs"></div>
      <div id="login-panels"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Firebase (compat = 전역 firebase 객체 제공) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js?v=16"></script>

  <script src="js/store.js?v=16"></script>
  <script src="js/auth.js?v=16"></script>
  <script src="js/ui.js?v=16"></script>
  <script src="js/api.js?v=16"></script>
  <script src="js/views/login.js?v=16"></script>
  <script>
    /* onAuthStateChanged 1회 대기 후 라우팅 결정
       - 이미 로그인된 사용자(승인/활성/role 검증 통과)는 app.html로 이동
       - 그 외 로그인 폼 노출 */
    (async () => {
      await Auth.waitForReady(3000);
      if (Auth.isAuthenticated()) {
        window.location.href = 'app.html';
      } else {
        LoginView.init();
      }
    })();
  </script>
</body>
</html>
