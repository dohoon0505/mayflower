<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎲 Mock 주문 생성기 — 메이플라워</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { padding: 2rem; max-width: 720px; margin: 0 auto; background: var(--bg); }
    .seed-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem;
    }
    .seed-log {
      background: #0f172a; color: #cbd5e1; font-family: monospace; font-size: 0.78rem;
      padding: 0.75rem; border-radius: var(--radius-sm); max-height: 360px;
      overflow-y: auto; white-space: pre-wrap;
    }
    .seed-log .ok  { color: #86efac; }
    .seed-log .err { color: #fca5a5; }
    .seed-log .info{ color: #93c5fd; }
    .seed-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; align-items: center; }
    .seed-row label { min-width: 150px; font-weight: 600; color: var(--text-secondary); }
    .seed-row .form-control { flex: 1; }
    .seed-stats { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .seed-stat { padding: 0.3rem 0.6rem; background: var(--bg-elevated);
                 border: 1px solid var(--border); border-radius: var(--radius-sm);
                 font-size: 0.8rem; font-weight: 600; }
  </style>
</head>
<body>
  <h1 style="display:flex; align-items:center; gap:0.5rem">🎲 Mock 주문 데이터 생성기</h1>
  <p style="color: var(--text-muted); margin-bottom: 1rem">
    관리자 계정으로 로그인 후 다양한 상품 · 금액 · 날짜 · 상태의 주문을 일괄 생성합니다.
    Firebase RTDB <code>/orders</code> 에 직접 push 합니다.
  </p>

  <div class="seed-card" id="step1">
    <h3 style="margin-top:0">1단계 — 관리자 로그인</h3>
    <div class="seed-row">
      <label>Username</label>
      <input id="u" class="form-control" placeholder="admin 계정">
    </div>
    <div class="seed-row">
      <label>Password</label>
      <input id="p" class="form-control" type="password">
    </div>
    <button id="loginBtn" class="btn btn-primary">🔑 로그인</button>
    <div id="loginMsg" style="margin-top:0.75rem; color: var(--danger);"></div>
  </div>

  <div class="seed-card" id="step2" style="display:none">
    <h3 style="margin-top:0">2단계 — 생성 옵션</h3>
    <div class="seed-row">
      <label>생성 개수</label>
      <input id="count" class="form-control" type="number" value="30" min="1" max="200">
    </div>
    <div class="seed-row">
      <label>배송일 범위</label>
      <select id="dayRange" class="form-control">
        <option value="mixed">섞임 (과거 ~ 미래)</option>
        <option value="today">오늘만</option>
        <option value="future">미래만 (예약건)</option>
        <option value="past">과거만 (지남)</option>
      </select>
    </div>
    <div class="seed-row">
      <label>상태 분포</label>
      <select id="statusMix" class="form-control">
        <option value="all">전체 분포 (0~4, 소수 취소/반품)</option>
        <option value="early">초기 (접수/확인/제작)</option>
        <option value="late">후기 (배송중/완료)</option>
      </select>
    </div>
    <div class="seed-row">
      <label>데이터 상태</label>
      <div id="dataStatus" class="seed-stats"></div>
    </div>
    <button id="genBtn" class="btn btn-success">🎲 생성 시작</button>
    <button id="wipeBtn" class="btn btn-ghost" style="margin-left:0.5rem">🗑 전체 주문 삭제</button>
    <div class="seed-log" id="log" style="margin-top:1rem; display:none"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js?v=7"></script>
  <script>
  (function() {
    const $ = id => document.getElementById(id);
    const db = firebase.database();
    const auth = firebase.auth();

    const log = (msg, cls = '') => {
      const el = $('log');
      el.style.display = 'block';
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = msg;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    };

    /* Mock data pools */
    const chains = ['행복꽃집','우리꽃집','장미꽃집','들꽃집','꽃피는집','청춘꽃집','나팔꽃집','해바라기꽃집','민들레꽃집','튤립꽃집','연꽃방','꽃놀이','꽃그림자','하늘꽃집','바람꽃집'];
    const names = ['김철수','이영희','박민수','정지은','최성훈','한지민','윤도현','강민지','임수정','이민준','박서연','김도윤','조현우','송지아','백설희','신우진','서예림','문재원','홍은서','배준호'];
    const addresses = [
      '대구시 중구 동성로 123',
      '대구시 동구 신천동 55-7',
      '대구시 서구 내당동 88-14',
      '대구시 남구 대명동 256',
      '대구시 북구 칠곡중앙대로 789',
      '대구시 수성구 범어동 45-2',
      '대구시 달서구 월성동 101-12',
      '대구시 달성군 화원읍 설화리 234',
      '대구시 중구 남산동 77',
      '대구시 동구 반야월로 333',
      '대구시 서구 평리동 112-5, 302호',
      '대구시 수성구 지산동 555 ○○아파트 105동 1203호',
      '대구시 북구 관음동 811-1',
      '대구시 달서구 상인동 1503 ○○타워 908호',
      '대구시 동구 방촌동 992-7',
    ];
    const ribbons = [
      '축하합니다','결혼을 진심으로 축하드립니다','개업을 진심으로 축하합니다',
      '영광의 그날을 축하합니다','삼가 고인의 명복을 빕니다','승진을 진심으로 축하드립니다',
      '건강과 행복이 가득하시길 바랍니다','만수무강하세요','감사합니다','축 우승',
      '언제나 행복하시길','생신을 축하드립니다','새 출발을 응원합니다',''
    ];
    const occasions = ['생신','결혼','개업','승진','장례','기념일','병문안','입학','졸업','기타'];
    const prices = [50000,60000,70000,80000,90000,100000,120000,150000,180000,200000,250000,300000];

    const pick = arr => arr[Math.floor(Math.random() * arr.length)];
    const randPhone = () => `010-${String(1000 + Math.floor(Math.random()*9000))}-${String(1000 + Math.floor(Math.random()*9000))}`;

    function randDT(range) {
      const now = new Date();
      const d = new Date(now);
      let offsetDays;
      if (range === 'today') offsetDays = 0;
      else if (range === 'future') offsetDays = 1 + Math.floor(Math.random()*5);
      else if (range === 'past') offsetDays = -(1 + Math.floor(Math.random()*3));
      else { /* mixed */ offsetDays = Math.floor(Math.random()*7) - 2; /* -2 ~ +4 */ }
      d.setDate(now.getDate() + offsetDays);
      d.setHours(7 + Math.floor(Math.random()*14));
      d.setMinutes(Math.floor(Math.random()*6) * 10);
      d.setSeconds(0, 0);
      return d.toISOString();
    }

    function pickStatus(mix) {
      const r = Math.random();
      if (mix === 'early') {
        if (r < 0.35) return 0;
        if (r < 0.65) return 1;
        return 2;
      }
      if (mix === 'late') {
        if (r < 0.45) return 3;
        if (r < 0.95) return 4;
        return 5;
      }
      /* all */
      if (r < 0.25) return 0;
      if (r < 0.40) return 1;
      if (r < 0.55) return 2;
      if (r < 0.70) return 3;
      if (r < 0.93) return 4;
      return r < 0.97 ? 5 : 6;
    }

    let _products = [], _drivers = [], _session = null;

    async function doLogin() {
      $('loginMsg').textContent = '';
      const u = $('u').value.trim().toLowerCase();
      const p = $('p').value;
      if (!u || !p) { $('loginMsg').textContent = '아이디·비밀번호를 입력하세요.'; return; }
      const email = `${u}@maydaegu.internal`;
      try {
        const cred = await auth.signInWithEmailAndPassword(email, p);
        const uid = cred.user.uid;
        const snap = await db.ref(`users/${uid}`).once('value');
        const profile = snap.val();
        if (!profile || profile.role !== 'admin') {
          await auth.signOut();
          $('loginMsg').textContent = 'admin 계정만 사용 가능합니다.';
          return;
        }
        _session = { uid, displayName: profile.displayName || u, role: 'admin' };
        await loadRefs();
        $('step1').style.display = 'none';
        $('step2').style.display = 'block';
      } catch (e) {
        $('loginMsg').textContent = `로그인 실패: ${e.message}`;
      }
    }

    async function loadRefs() {
      const [prodSnap, drvSnap] = await Promise.all([
        db.ref('products').once('value'),
        db.ref('drivers').once('value'),
      ]);
      _products = Object.entries(prodSnap.val() || {})
        .map(([id, v]) => ({ id, ...v }))
        .filter(p => p.isActive !== false);
      _drivers = Object.entries(drvSnap.val() || {})
        .map(([id, v]) => ({ id, ...v }))
        .filter(d => d.isActive !== false);
      const statsEl = $('dataStatus');
      statsEl.innerHTML = `
        <span class="seed-stat">📦 상품 ${_products.length}개</span>
        <span class="seed-stat">🚗 기사 ${_drivers.length}명</span>
        <span class="seed-stat">👤 ${_session.displayName}</span>
      `;
      if (_products.length === 0) {
        log('[경고] 활성 상품이 없습니다. 관리자에서 상품을 먼저 추가하세요.', 'err');
        $('genBtn').disabled = true;
      }
    }

    async function doGen() {
      const count = Math.max(1, Math.min(200, +$('count').value || 30));
      const dayRange = $('dayRange').value;
      const statusMix = $('statusMix').value;

      $('log').innerHTML = '';
      log(`Mock 주문 ${count}건 생성 시작…`, 'info');
      $('genBtn').disabled = true;

      let ok = 0, fail = 0;
      for (let i = 0; i < count; i++) {
        try {
          const product = pick(_products);
          const status = pickStatus(statusMix);
          const isImmediate = Math.random() < 0.1;
          const deliveryDatetime = isImmediate
            ? new Date(Date.now() + 3*3600*1000).toISOString()
            : randDT(dayRange);

          /* Driver assignment logic based on status */
          let assignedDriverId = null, assignedDriverName = null, assignedAt = null;
          if (status >= 3 && _drivers.length > 0) {
            const drv = pick(_drivers);
            assignedDriverId = drv.id;
            assignedDriverName = drv.name;
            assignedAt = new Date(new Date(deliveryDatetime).getTime() - (1 + Math.random()*2)*3600*1000).toISOString();
          } else if (status >= 1 && _drivers.length > 0 && Math.random() < 0.4) {
            const drv = pick(_drivers);
            assignedDriverId = drv.id;
            assignedDriverName = drv.name;
            assignedAt = new Date().toISOString();
          }

          const now = new Date().toISOString();
          const createdAt = new Date(new Date(deliveryDatetime).getTime() - (3 + Math.random()*24)*3600*1000).toISOString();

          const order = {
            chainName: pick(chains),
            productId: product.id,
            productName: product.name,
            deliveryDatetime,
            isImmediate,
            deliveryAddress: pick(addresses),
            recipientName: pick(names),
            recipientPhone: randPhone(),
            ribbonText: pick(ribbons),
            occasionText: pick(occasions),
            price: pick(prices),
            status,
            assignedDriverId,
            assignedDriverName,
            assignedAt,
            storePhotoUrl: null,
            deliveryPhotoUrl: null,
            createdByUserId: _session.uid,
            createdByName: _session.displayName + ' (Mock)',
            createdAt,
            updatedAt: status === 4
              ? new Date(new Date(deliveryDatetime).getTime() + Math.random()*3600*1000).toISOString()
              : now,
          };

          await db.ref('orders').push(order);
          ok++;
          if ((i+1) % 10 === 0) log(`  진행: ${i+1}/${count}`, 'info');
        } catch (e) {
          fail++;
          log(`[오류 ${i+1}] ${e.message}`, 'err');
        }
      }
      log(`완료 — 성공 ${ok} / 실패 ${fail}`, 'ok');
      $('genBtn').disabled = false;
    }

    async function doWipe() {
      if (!confirm('정말로 /orders 전체를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
      if (!confirm('다시 한 번 확인합니다. 모든 주문이 영구 삭제됩니다. 계속할까요?')) return;
      $('wipeBtn').disabled = true;
      try {
        await db.ref('orders').remove();
        log('✔ 모든 주문이 삭제되었습니다.', 'ok');
      } catch (e) {
        log(`삭제 실패: ${e.message}`, 'err');
      }
      $('wipeBtn').disabled = false;
    }

    $('loginBtn').addEventListener('click', doLogin);
    $('p').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    $('genBtn').addEventListener('click', doGen);
    $('wipeBtn').addEventListener('click', doWipe);
  })();
  </script>
</body>
</html>
