  <script>
    /* ?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═??       AppShell ??session guard, nav build, sidebar toggle
    ?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═??*/
    const AppShell = {
      _session: null,

      init() {
        const session = Auth.requireAuth();
        if (!session) return; /* redirected to index.html */
        AppShell._session = session;

        AppShell.buildNav(session.role);
        AppShell.bindLogout();
        AppShell.bindSidebar();
        AppShell.bindChatToggle();
        AppShell.bindSidebarCollapse(session);

        /* initialise views by role
           NOTE: Floor1View.init must run BEFORE AdminView.init
           so the click/visibilitychange listeners are registered
           before AdminView registers its routes */
        switch (session.role) {
          case 'floor2': Floor2View.init(session); break;
          case 'floor1': Floor1View.init(session); break;
          case 'driver': DriverView.init(session); break;
          case 'admin':
            Floor1View.init(session); /* must be first ??registers listeners */
            AdminView.init(session);
            break;
        }

        Router.init();
        Chat.init(session);
      },

      buildNav(role) {
        const menus = {
          floor2: [
            { icon: '?��', label: '??주문',    route: 'my-orders' },
            { icon: '?�️', label: '?�규 ?�수',  route: 'new-order' },
          ],
          floor1: [
            { icon: '?��', label: '?�체 주문',  route: 'all-orders' },
          ],
          driver: [
            { icon: '?��', label: '??배송',    route: 'my-deliveries' },
          ],
          admin: [
            { icon: '?��', label: '?�체 주문',       route: 'all-orders' },
            { icon: '?��', label: '?�용???�인',      route: 'manage-users' },
            { icon: '?��', label: '?�품 관�?,        route: 'manage-products' },
            { icon: '?��', label: '기사 관�?,        route: 'manage-drivers' },
            { icon: '?��', label: '?�계 · ?�산',      route: 'statistics' },
          ],
        };

        const nav = document.getElementById('sidebar-nav');
        const session = AppShell._session;
        const items = menus[role] || [];

        nav.innerHTML = `
          <div class="nav-section-label">${UI.ROLE_LABELS[role] || role}</div>
          ${items.map(m => `
            <button class="nav-item" data-route="${m.route}"
              onclick="Router.navigate('${m.route}'); AppShell.closeSidebar()">
              <span class="nav-icon">${m.icon}</span>
              <span>${m.label}</span>
            </button>`).join('')}`;

      },

      bindLogout() {
        document.getElementById('btn-logout').addEventListener('click', async () => {
          const ok = await UI.confirm('로그?�웃 ?�시겠습?�까?', '로그?�웃');
          if (ok) Auth.logout();
        });
      },

      bindSidebar() {
        const sidebar  = document.getElementById('sidebar');
        const overlay  = document.getElementById('sidebar-overlay');
        const hambBtn  = document.getElementById('hamburger-btn');

        hambBtn.addEventListener('click', () => {
          const open = sidebar.classList.toggle('open');
          overlay.classList.toggle('show', open);
        });
        overlay.addEventListener('click', () => AppShell.closeSidebar());
      },

      closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
      },

      bindSidebarCollapse(session) {
        const STORAGE_KEY = `maydaegu.sidebar.${session.userId}`;
        const shell  = document.querySelector('.shell');
        const btn    = document.getElementById('sidebar-toggle');
        const arrow  = btn.querySelector('.toggle-arrow');

        const applyState = (collapsed) => {
          shell.classList.toggle('sidebar-collapsed', collapsed);
          arrow.textContent = collapsed ? '?? : '??;
        };

        /* Restore persisted state */
        applyState(localStorage.getItem(STORAGE_KEY) === '1');

        btn.addEventListener('click', () => {
          const collapsed = !shell.classList.contains('sidebar-collapsed');
          applyState(collapsed);
          localStorage.setItem(STORAGE_KEY, collapsed ? '1' : '0');
        });
      },

      bindChatToggle() {
        const panel = document.getElementById('chat-panel');
        document.getElementById('chat-toggle-btn').addEventListener('click', () => {
          panel.classList.toggle('open');
        });
        /* close on outside click (tablet) */
        document.getElementById('sidebar-overlay').addEventListener('click', () => {
          panel.classList.remove('open');
        });
      },
    };

    /* ?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═??       DeliveryPanel ??배송기사 ?�황 ?�널
    ?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═??*/
    const DeliveryPanel = {
      /* RTDB /driverStatus 캐시 (?�라?�버 Flutter ?�이 기록?�는 ?�시�??�태·GPS) */
      _driverStatus: {},
      _dsSubscribed: false,
      _ensureDriverStatusSubscription() {
        if (DeliveryPanel._dsSubscribed) return;
        if (!window.FirebaseDB) return;
        window.FirebaseDB.ref('driverStatus').on('value', (snap) => {
          DeliveryPanel._driverStatus = snap.val() || {};
          DeliveryPanel.render();
        }, (err) => {
          console.warn('[DeliveryPanel] /driverStatus 구독 ?�러:', err?.message);
        });
        DeliveryPanel._dsSubscribed = true;
      },

      /* ?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═??         배송기사 ?�태 ?�고리즘 (주문 ?�태 기반 ?�동 ?�정)

         뱃�? ?�동 결정 (?�선?�위 ??:
           배송�?  = delivering(status=3) > 0
           배차?�료 = assigned(status 0-2) > 0, delivering=0
           복�?�?  = delivering=0, assigned=0, 리셋??completed(status=4) > 0
           배송?��?= 모두 0 (리셋 직후 ?�는 ?�일 ?�동 ?�음)

         ?�️ APP ?�동 ?�후 변�??�정 (?�재 미구??:
           [1] 배송�?= ?�라?�버 APP "배송출발" 버튼 ?�릭 ???�정
               ???�재??주문 status=3 ?�로 ?��?감�?
           [2] 복�?�??�동 ?�환 = 배차??마�?�?주문??배송?�진 ?�로???�점
               ???�재??delivering=0 && assigned=0 && completed>0 ?�로 ?��?감�?
           [3] 배송?��??�동 ?�환 = GPS ?�치 기반
               (?��??�서�??�기??666-1 반경 100m ?�근)
               ???�재??admin ?�동 "배송?�기로 리셋" 버튼 ?�용
           [4] ?�라?�버 ID/PW 로그??+ admin ?�이지?�서 계정 관�?        ?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═?�═ */

      /* 리셋 ?�?�스?�프: ???�각 ?�후 updatedAt 주문�?카운?????�?�라??초기???�과 */
      _getResetTs(driverId) {
        return localStorage.getItem(`maydaegu.driver.resetTs.${driverId}`) || '';
      },
      _setResetTs(driverId, ts) {
        localStorage.setItem(`maydaegu.driver.resetTs.${driverId}`, ts);
      },
      _afterReset(order, resetTs) {
        if (!resetTs) return true;
        if (!order.updatedAt) return true;
        return new Date(order.updatedAt) >= new Date(resetTs);
      },

      /* ?�무(off-duty) ?�태: 배송?�기일 ?�만 ?�동 ?��? 가??*/
      _getOffDuty(driverId) {
        return localStorage.getItem(`maydaegu.driver.offduty.${driverId}`) === '1';
      },
      _setOffDuty(driverId, off) {
        if (off) localStorage.setItem(`maydaegu.driver.offduty.${driverId}`, '1');
        else     localStorage.removeItem(`maydaegu.driver.offduty.${driverId}`);
      },

      /* 공통 뱃�? ?�정 ??render()?� openTimeline()??공유
         ?�선?�위: /driverStatus.badge 가 ?�으�?그것 ?�용, ?�으�?주문 기반 계산 */
      _computeBadge(d, allOrders) {
        const resetTs    = DeliveryPanel._getResetTs(d.id);
        const myOrders   = allOrders.filter(o => o.assignedDriverId === d.id);
        const assigned   = myOrders.filter(o => o.status >= 0 && o.status <= 2);
        const delivering = myOrders.filter(o => o.status === 3);
        const completed  = myOrders.filter(o => o.status === 4 && DeliveryPanel._afterReset(o, resetTs));
        const isOff      = DeliveryPanel._getOffDuty(d.id);

        /* driver Flutter ?�이 기록???�시�?뱃�? ?�선 */
        const remote = DeliveryPanel._driverStatus[d.id];
        const allowed = ['delivering', 'assigned', 'returning', 'waiting', 'off'];
        if (remote?.badge && allowed.includes(remote.badge)) {
          return { badge: remote.badge, assigned, delivering, completed };
        }

        let badge;
        if (delivering.length > 0)     badge = 'delivering';
        else if (assigned.length > 0)  badge = 'assigned';
        else if (completed.length > 0) badge = 'returning';
        else if (isOff)                badge = 'off';       /* 배송?��??�태?�서�??�무 ?�용 */
        else                           badge = 'waiting';
        return { badge, assigned, delivering, completed };
      },

      render() {
        const el = document.getElementById('dp-body');
        if (!el) return;

        DeliveryPanel._ensureDriverStatusSubscription();

        const drivers   = Store.getDrivers();
        const allOrders = Store.getOrders();

        if (!drivers.length) {
          el.innerHTML = '<div class="dp-empty">?�록??기사가 ?�습?�다.</div>';
          return;
        }

        /* Build + sort: 배송�?0) ??배차?�료(1) ??복�?�?2) ??배송?��?3) ???�무(4) */
        const data = drivers.map(d => {
          const { badge, assigned, delivering, completed } = DeliveryPanel._computeBadge(d, allOrders);
          const total    = delivering.length + completed.length;
          const pct      = total > 0 ? Math.round((completed.length / total) * 100) : 0;
          const priority = badge === 'delivering' ? 0
                         : badge === 'assigned'   ? 1
                         : badge === 'returning'  ? 2
                         : badge === 'waiting'    ? 3 : 4;
          return { d, assigned, delivering, completed, badge, total, pct, priority };
        }).sort((a, b) => a.priority - b.priority);

        const cards = data.map(({ d, assigned, delivering, completed, badge, total, pct }) => {
          const lastDone = completed
            .filter(o => o.updatedAt)
            .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))[0];
          const lastAddr = lastDone
            ? UI.escHtml((lastDone.deliveryAddress || '').substring(0, 26))
            : '?�음';

          const [statusBadge, cardCls] =
            badge === 'delivering' ? [`<span class="dp-badge dp-badge-delivering">배송�?/span>`,  'dp-card-active']    :
            badge === 'assigned'   ? [`<span class="dp-badge dp-badge-assigned">배차?�료</span>`, 'dp-card-assigned']  :
            badge === 'returning'  ? [`<span class="dp-badge dp-badge-returning">복�?�?/span>`,   'dp-card-returning'] :
            badge === 'off'        ? [`<span class="dp-badge dp-badge-off">?�무</span>`,          'dp-card-off']       :
                                     [`<span class="dp-badge dp-badge-waiting">배송?��?/span>`,  ''];

          return `
            <div class="dp-driver-card ${cardCls}">
              <div class="dp-card-name-row">
                <button class="dp-driver-name-btn" onclick="DeliveryPanel.openTimeline('${d.id}')" title="?�?�라??/ ?�태 변�?>
                  ${UI.escHtml(d.name)}
                </button>
                ${statusBadge}
              </div>
              <div class="dp-card-stats">
                <span class="dp-stat dp-stat-delivering"><span class="dp-stat-num">${delivering.length}</span> 배송�?/span>
                <span class="dp-stat dp-stat-done"><span class="dp-stat-num">${completed.length}</span> ?�료</span>
              </div>
              <div class="dp-progress-row">
                <div class="dp-progress-wrap">
                  <div class="dp-progress-bar" style="width:${pct}%"></div>
                </div>
                <span class="dp-progress-pct">${pct}%</span>
              </div>
              <div class="dp-last-addr"><span class="dp-meta-icon">?��</span>최종배송지: ${lastAddr}</div>
            </div>`;
        }).join('');

        el.innerHTML = cards;
      },

      openTimeline(driverId) {
        const drivers   = Store.getDrivers();
        const allOrders = Store.getOrders();
        const d = drivers.find(x => String(x.id) === String(driverId));
        if (!d) return;

        const resetTs = DeliveryPanel._getResetTs(driverId);
        const myOrders = allOrders.filter(o => o.assignedDriverId === d.id);

        /* 배송�? status=3 (출발 ?�료, ?�송 �?. reset �?무�??�게 ?�재 진행중인 건�? 모두 ?�시. */
        const delivering = myOrders
          .filter(o => o.status === 3)
          .sort((a, b) => new Date(a.deliveryDatetime || a.assignedAt || a.updatedAt)
                        - new Date(b.deliveryDatetime || b.assignedAt || b.updatedAt));

        /* 배송?�료: reset ?�후???�료건만 */
        const completed = myOrders
          .filter(o => o.status === 4 && o.updatedAt && DeliveryPanel._afterReset(o, resetTs))
          .sort((a, b) => new Date(a.updatedAt) - new Date(b.updatedAt));

        const _row = (o, label, cls) => `
          <div class="dp-tl-item">
            <span class="dp-tl-time">${UI.fmtDatetime(o.status === 4 ? o.updatedAt : (o.deliveryDatetime || o.assignedAt || o.updatedAt))}</span>
            <span class="dp-tl-addr">${UI.escHtml(o.deliveryAddress || '')}</span>
            <span class="${cls}">${label}</span>
          </div>`;

        const sectionDelivering = delivering.length
          ? `<div class="dp-tl-section-title dp-tl-sec-ing">?�� 배송�?<span class="dp-tl-count">${delivering.length}</span></div>
             <div class="dp-tl-group">${delivering.map(o => _row(o, '배송�?, 'dp-tl-ing')).join('')}</div>`
          : '';
        const sectionCompleted = completed.length
          ? `<div class="dp-tl-section-title dp-tl-sec-done">??배송?�료 <span class="dp-tl-count">${completed.length}</span></div>
             <div class="dp-tl-group">${completed.map(o => _row(o, '배송?�료', 'dp-tl-done')).join('')}</div>`
          : '';

        const rows = (sectionDelivering || sectionCompleted)
          ? (sectionDelivering + sectionCompleted)
          : '<p class="dp-tl-empty">진행중이거나 ?�료??배송???�습?�다.</p>';

        /* 복�?�?returning) ?�태????'?�무??복�?까�?' 배너 placeholder */
        const { badge: curBadge } = DeliveryPanel._computeBadge(d, allOrders);
        const etaBanner = curBadge === 'returning'
          ? `<div class="dp-tl-eta" id="dp-tl-eta-${d.id}">?�� ?�무??복�?까�? 계산 중�?/div>`
          : '';

        const content = `<div class="dp-tl-modal-body" style="pointer-events:none;user-select:text">${etaBanner}${rows}</div>`;

        const overlay = UI.modal({
          title: `?�� ${UI.escHtml(d.name)} ??배송 ?�?�라??,
          content,
          confirmText: '?�기',
          cancelText: '',
          size: 'modal-timeline',
        });
        overlay.querySelector('.modal-cancel').style.display = 'none';

        /* 복�? ETA 계산 ??마�?�?배송?�료 주소 ???�무??*/
        if (curBadge === 'returning' && completed.length && window.NaverMaps) {
          const last = completed[completed.length - 1];
          const etaEl = overlay.querySelector(`#dp-tl-eta-${d.id}`);
          if (etaEl && last.deliveryAddress) {
            (async () => {
              try {
                const { durationMs, distanceM } = await window.NaverMaps.estimateReturnFromAddress(last.deliveryAddress);
                const mins = Math.max(1, Math.round(durationMs / 60000));
                const arrive = new Date(Date.now() + durationMs);
                const hh = String(arrive.getHours()).padStart(2, '0');
                const mm = String(arrive.getMinutes()).padStart(2, '0');
                const km = (distanceM / 1000).toFixed(1);
                etaEl.innerHTML = `?�� ?�무??복�?까�? ??<b>${mins}�?/b> ?�상 · ${km}km · ?�착 ?�정 ${hh}:${mm}`;
              } catch (e) {
                console.warn('[ETA] 복�? ?�간 계산 ?�패:', e);
                etaEl.classList.add('dp-tl-eta-fail');
                etaEl.innerHTML = '?�� 복�? ?�간 계산 불�? (?�이�?지??API ?�메???�록 ?�요)';
              }
            })();
          }
        }

        const footer = overlay.querySelector('.modal-footer');
        const wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex;gap:0.5rem;margin-right:auto';

        const close = () => { overlay.classList.remove('show'); setTimeout(() => overlay.remove(), 300); };

        if (curBadge === 'waiting' || curBadge === 'off') {
          /* 배송?��?/ ?�무 ?�태: 출근 ???�무 ?��? */
          const isOff = curBadge === 'off';
          wrap.innerHTML = `
            <button class="btn btn-sm ${!isOff ? 'btn-primary' : 'btn-secondary'}" id="dp-btn-on">?�� 출근</button>
            <button class="btn btn-sm ${isOff ? 'btn-warning' : 'btn-secondary'}"  id="dp-btn-off">?�� ?�무</button>`;
          footer.insertBefore(wrap, footer.firstChild);

          wrap.querySelector('#dp-btn-on').addEventListener('click', () => {
            DeliveryPanel._setOffDuty(driverId, false);
            close(); DeliveryPanel.render();
          });
          wrap.querySelector('#dp-btn-off').addEventListener('click', () => {
            DeliveryPanel._setOffDuty(driverId, true);
            close(); DeliveryPanel.render();
          });
        } else {
          /* 배송�?/ 배차?�료 / 복�?�? ?�?�라??초기??(배송?�기로 리셋) */
          /* ?�️ [3] APP ?�동 ???�시: GPS 기반 ?�동 "배송?��? ?�환 ?��?*/
          wrap.innerHTML = `
            <button class="btn btn-sm btn-warning" id="dp-btn-reset" title="?�?�라?�을 초기?�하�?배송?��??�태�??�환 (APP GPS ?�동 ???�시 버튼)">?�� 배송?�기로 리셋</button>`;
          footer.insertBefore(wrap, footer.firstChild);

          wrap.querySelector('#dp-btn-reset').addEventListener('click', async () => {
            const ok = await UI.confirm(`${d.name} 기사??배송 ?�?�라?�을 초기?�하�?배송?��??�태�??�환?�니??`, '배송?�기로 리셋');
            if (!ok) return;
            DeliveryPanel._setResetTs(driverId, new Date().toISOString());
            close(); DeliveryPanel.render();
          });
        }
      },
    };

    /* onAuthStateChanged 복원 ??AppShell 부?????�로고침 ?�래??방�? */
    (async () => {
      await Auth.waitForReady(3000);
      const session = Auth.getSession();
      if (!session) { window.location.href = 'index.html?error=unauth'; return; }
      /* ?�라?�버??모바?????�용 */
      if (session.role === 'driver') {
        await Auth.logout();
        window.location.href = 'index.html?error=driver_only';
        return;
      }

      /* RTDB 구독 ?�작 ??�??�냅???�신까�? ?��?*/
      Store.startSubscriptions();
      await Store.whenReady(4000);

      /* ?�이�?리렌?? orders 변�????�재 뷰�? DeliveryPanel ?�렌??*/
      const refreshOrders = () => {
        if (typeof Floor1View !== 'undefined' && Floor1View._loadOrders && document.querySelector('.order-list')) {
          Floor1View._loadOrders();
        }
        if (typeof Floor2View !== 'undefined' && Floor2View._loadMyOrders && document.querySelector('[data-view="floor2"]')) {
          Floor2View._loadMyOrders();
        }
        if (typeof DeliveryPanel !== 'undefined') DeliveryPanel.render();
      };
      Store.onUpdate('orders',  refreshOrders);
      Store.onUpdate('drivers', refreshOrders);

      AppShell.init();
      DeliveryPanel.render();
    })();
  </script>
