<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이대구</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
</head>
<body>

  <!-- Global overlays -->
  <div id="global-loading" style="display:none"><div class="spinner"></div></div>
  <div id="toast-container"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="shell">

    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo">
          <img src="assets/logo.svg" alt="메이대구">
          <span class="sidebar-logo-text">메이대구</span>
          <button class="sidebar-toggle-btn" id="sidebar-toggle" title="메뉴 접기/펼치기">
            <span class="toggle-arrow">‹</span>
          </button>
        </div>
        <div class="sidebar-profile" id="sidebar-profile"></div>
        <nav class="sidebar-nav" id="sidebar-nav">
          <!-- filled by AppShell.buildNav() -->
        </nav>
      </div>
      <div class="sidebar-bottom">
        <button class="nav-item logout-btn" id="btn-logout">
          <span class="nav-icon">⏻</span>
          <span>로그아웃</span>
        </button>
      </div>
    </aside>

    <!-- ── Main Panel ─────────────────────────────────────── -->
    <main class="main-panel">
      <!-- Mobile top bar -->
      <div class="mobile-header">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="메뉴 열기">
          <span></span><span></span><span></span>
        </button>
        <span class="mobile-title" id="mobile-title">메이대구</span>
        <button class="chat-toggle-btn" id="chat-toggle-btn" title="채팅 패널">💬</button>
      </div>

      <!-- Filter area (filled per view) -->
      <div class="filter-area" id="filter-area"></div>

      <!-- Content area (filled per view) -->
      <div class="content-area" id="main-content"></div>
    </main>

    <!-- ── Delivery Panel ───────────────────────────────── -->
    <aside class="delivery-panel" id="delivery-panel">
      <div class="dp-header">
        <span>🚚 배송기사 현황</span>
        <button class="dp-refresh-btn" onclick="DeliveryPanel.render()" title="새로고침">↻</button>
      </div>
      <div class="dp-body" id="dp-body"></div>
    </aside>

    <!-- ── Chat Panel ────────────────────────────────────── -->
    <aside class="chat-panel" id="chat-panel">
      <div class="chat-header">💬 메이플라워 채팅방</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="메시지 입력...">
        <button id="chat-send" class="btn btn-primary btn-sm">전송</button>
      </div>
    </aside>

  </div><!-- /.shell -->

  <!-- Scripts — order matters -->
  <!-- Firebase (compat = 전역 firebase 객체 제공) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/router.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/views/floor2.js"></script>
  <script src="js/views/floor1.js"></script>
  <script src="js/views/driver.js"></script>
  <script src="js/views/admin.js"></script>

  <script>
    /* ═══════════════════════════════════════════════════════
       AppShell — session guard, nav build, sidebar toggle
    ═══════════════════════════════════════════════════════ */
    const AppShell = {
      _session: null,

      init() {
        const session = Auth.requireAuth();
        if (!session) return; /* redirected to index.html */
        AppShell._session = session;

        AppShell.buildNav(session.role);
        AppShell.bindLogout();
        AppShell.bindSidebar();
        AppShell.bindChatToggle();
        AppShell.bindSidebarCollapse(session);

        /* initialise views by role
           NOTE: Floor1View.init must run BEFORE AdminView.init
           so the click/visibilitychange listeners are registered
           before AdminView registers its routes */
        switch (session.role) {
          case 'floor2': Floor2View.init(session); break;
          case 'floor1': Floor1View.init(session); break;
          case 'driver': DriverView.init(session); break;
          case 'admin':
            Floor1View.init(session); /* must be first — registers listeners */
            AdminView.init(session);
            break;
        }

        Router.init();
        Chat.init(session);
      },

      buildNav(role) {
        const menus = {
          floor2: [
            { icon: '📋', label: '내 주문',    route: 'my-orders' },
            { icon: '✏️', label: '신규 접수',  route: 'new-order' },
          ],
          floor1: [
            { icon: '📦', label: '전체 주문',  route: 'all-orders' },
          ],
          driver: [
            { icon: '🚚', label: '내 배송',    route: 'my-deliveries' },
          ],
          admin: [
            { icon: '📦', label: '전체 주문',       route: 'all-orders' },
            { icon: '🌸', label: '상품 관리',        route: 'manage-products' },
            { icon: '🚗', label: '기사 관리',        route: 'manage-drivers' },
            { icon: '📊', label: '통계 · 정산',      route: 'statistics' },
          ],
        };

        const nav = document.getElementById('sidebar-nav');
        const session = AppShell._session;
        const items = menus[role] || [];

        nav.innerHTML = `
          <div class="nav-section-label">${UI.ROLE_LABELS[role] || role}</div>
          ${items.map(m => `
            <button class="nav-item" data-route="${m.route}"
              onclick="Router.navigate('${m.route}'); AppShell.closeSidebar()">
              <span class="nav-icon">${m.icon}</span>
              <span>${m.label}</span>
            </button>`).join('')}`;

      },

      bindLogout() {
        document.getElementById('btn-logout').addEventListener('click', async () => {
          const ok = await UI.confirm('로그아웃 하시겠습니까?', '로그아웃');
          if (ok) Auth.logout();
        });
      },

      bindSidebar() {
        const sidebar  = document.getElementById('sidebar');
        const overlay  = document.getElementById('sidebar-overlay');
        const hambBtn  = document.getElementById('hamburger-btn');

        hambBtn.addEventListener('click', () => {
          const open = sidebar.classList.toggle('open');
          overlay.classList.toggle('show', open);
        });
        overlay.addEventListener('click', () => AppShell.closeSidebar());
      },

      closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
      },

      bindSidebarCollapse(session) {
        const STORAGE_KEY = `maydaegu.sidebar.${session.userId}`;
        const shell  = document.querySelector('.shell');
        const btn    = document.getElementById('sidebar-toggle');
        const arrow  = btn.querySelector('.toggle-arrow');

        const applyState = (collapsed) => {
          shell.classList.toggle('sidebar-collapsed', collapsed);
          arrow.textContent = collapsed ? '›' : '‹';
        };

        /* Restore persisted state */
        applyState(localStorage.getItem(STORAGE_KEY) === '1');

        btn.addEventListener('click', () => {
          const collapsed = !shell.classList.contains('sidebar-collapsed');
          applyState(collapsed);
          localStorage.setItem(STORAGE_KEY, collapsed ? '1' : '0');
        });
      },

      bindChatToggle() {
        const panel = document.getElementById('chat-panel');
        document.getElementById('chat-toggle-btn').addEventListener('click', () => {
          panel.classList.toggle('open');
        });
        /* close on outside click (tablet) */
        document.getElementById('sidebar-overlay').addEventListener('click', () => {
          panel.classList.remove('open');
        });
      },
    };

    /* ═══════════════════════════════════════════════════════
       DeliveryPanel — 배송기사 현황 패널
    ═══════════════════════════════════════════════════════ */
    const DeliveryPanel = {

      _getStatus(driverId) {
        return localStorage.getItem(`maydaegu.driver.status.${driverId}`) || 'on';
      },
      _setStatus(driverId, status) {
        localStorage.setItem(`maydaegu.driver.status.${driverId}`, status);
      },

      render() {
        const el = document.getElementById('dp-body');
        if (!el) return;

        const drivers   = Store.getDrivers();
        const allOrders = Store.getOrders();

        if (!drivers.length) {
          el.innerHTML = '<div class="dp-empty">등록된 기사가 없습니다.</div>';
          return;
        }

        /* Build + sort: 배송중(0) → 배송대기(1) → 복귀중(2) */
        const data = drivers.map(d => {
          const myOrders    = allOrders.filter(o => o.assignedDriverId === d.id);
          const delivering  = myOrders.filter(o => o.status === 3);
          const completed   = myOrders.filter(o => o.status === 4);
          const isReturning = DeliveryPanel._getStatus(d.id) === 'returning';
          const total       = delivering.length + completed.length;
          const pct         = total > 0 ? Math.round((completed.length / total) * 100) : 0;
          const priority    = isReturning ? 2 : delivering.length > 0 ? 0 : 1;
          return { d, delivering, completed, isReturning, total, pct, priority };
        }).sort((a, b) => a.priority - b.priority);

        const cards = data.map(({ d, delivering, completed, isReturning, total, pct }) => {
          const lastDone = completed
            .filter(o => o.updatedAt)
            .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))[0];
          const lastAddr = lastDone
            ? UI.escHtml((lastDone.deliveryAddress || '').substring(0, 26))
            : '없음';

          const [statusBadge, cardCls] = isReturning
            ? [`<span class="dp-badge dp-badge-returning">복귀중</span>`, 'dp-card-returning']
            : delivering.length > 0
              ? [`<span class="dp-badge dp-badge-delivering">배송중</span>`, 'dp-card-active']
              : [`<span class="dp-badge dp-badge-waiting">배송대기</span>`, ''];

          return `
            <div class="dp-driver-card ${cardCls}">
              <div class="dp-card-name-row">
                <button class="dp-driver-name-btn" onclick="DeliveryPanel.openTimeline('${d.id}')" title="타임라인 / 상태 변경">
                  ${UI.escHtml(d.name)}
                </button>
                ${statusBadge}
              </div>
              <div class="dp-card-stats">
                <span class="dp-stat dp-stat-delivering"><span class="dp-stat-num">${delivering.length}</span> 배송중</span>
                <span class="dp-stat dp-stat-done"><span class="dp-stat-num">${completed.length}</span> 완료</span>
              </div>
              <div class="dp-progress-row">
                <div class="dp-progress-wrap">
                  <div class="dp-progress-bar" style="width:${pct}%"></div>
                </div>
                <span class="dp-progress-pct">${pct}%</span>
              </div>
              <div class="dp-last-addr"><span class="dp-meta-icon">📍</span>최종배송지: ${lastAddr}</div>
            </div>`;
        }).join('');

        el.innerHTML = cards;
      },

      openTimeline(driverId) {
        const drivers   = Store.getDrivers();
        const allOrders = Store.getOrders();
        const d = drivers.find(x => String(x.id) === String(driverId));
        if (!d) return;

        const curStatus = DeliveryPanel._getStatus(driverId);
        const completed = allOrders
          .filter(o => o.assignedDriverId === d.id && o.status === 4 && o.updatedAt)
          .sort((a, b) => new Date(a.updatedAt) - new Date(b.updatedAt));

        const rows = completed.length
          ? completed.map(o => `
              <div class="dp-tl-item">
                <span class="dp-tl-time">${UI.fmtDatetime(o.updatedAt)}</span>
                <span class="dp-tl-addr">${UI.escHtml(o.deliveryAddress || '')}</span>
                <span class="dp-tl-done">배송완료</span>
              </div>`).join('')
          : '<p class="dp-tl-empty">완료된 배송 이력이 없습니다.</p>';

        const content = `<div class="dp-tl-modal-body" style="pointer-events:none;user-select:text">${rows}</div>`;

        const overlay = UI.modal({
          title: `🚚 ${UI.escHtml(d.name)} — 배송 타임라인`,
          content,
          confirmText: '닫기',
          cancelText: '',
          size: 'modal-timeline',
        });
        overlay.querySelector('.modal-cancel').style.display = 'none';

        /* 상태 변경 버튼: 배송중 · 배송대기 · 복귀중 */
        const footer = overlay.querySelector('.modal-footer');
        const wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex;gap:0.5rem;margin-right:auto';
        wrap.innerHTML = `
          <button class="btn btn-sm ${curStatus !== 'returning' && curStatus === 'on' ? 'btn-primary' : 'btn-secondary'}"   id="dp-btn-on">🚚 출근</button>
          <button class="btn btn-sm ${curStatus === 'returning' ? 'btn-warning' : 'btn-secondary'}" id="dp-btn-returning">🔄 복귀중</button>`;
        footer.insertBefore(wrap, footer.firstChild);

        const close = () => { overlay.classList.remove('show'); setTimeout(() => overlay.remove(), 300); };
        wrap.querySelector('#dp-btn-on').addEventListener('click', () => {
          DeliveryPanel._setStatus(driverId, 'on');
          close(); DeliveryPanel.render();
        });
        wrap.querySelector('#dp-btn-returning').addEventListener('click', () => {
          DeliveryPanel._setStatus(driverId, 'returning');
          close(); DeliveryPanel.render();
        });
      },
    };

    AppShell.init();
    DeliveryPanel.render();
  </script>
</body>
</html>
