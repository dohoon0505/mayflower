<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이대구</title>
  <link rel="stylesheet" href="css/base.css?v=52">
  <link rel="stylesheet" href="css/layout.css?v=52">
  <link rel="stylesheet" href="css/components.css?v=52">
  <link rel="stylesheet" href="css/views.css?v=52">
  <script>
    /* 큰글씨모드 조기 적용 — CSS 파싱 직후 즉시 반영해 깜빡임 방지 */
    (function () {
      try {
        if (localStorage.getItem('maydaegu.largeText') === '1') {
          document.documentElement.classList.add('large-text');
        }
      } catch (_) {}
    })();
  </script>
</head>
<body>

  <!-- Global overlays -->
  <div id="global-loading" style="display:none"><div class="spinner"></div></div>
  <div id="toast-container"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="shell">

    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo">
          <img src="assets/logo.svg" alt="메이대구">
          <span class="sidebar-logo-text">메이대구</span>
          <button class="sidebar-toggle-btn" id="sidebar-toggle" title="메뉴 접기/펼치기">
            <span class="toggle-arrow">‹</span>
          </button>
        </div>
        <div class="sidebar-profile" id="sidebar-profile"></div>
        <nav class="sidebar-nav" id="sidebar-nav">
          <!-- filled by AppShell.buildNav() -->
        </nav>
      </div>
      <div class="sidebar-bottom">
        <label class="nav-toggle-item" id="large-text-toggle-wrap" title="큰글씨모드 켜기/끄기">
          <span class="nav-icon">🔍</span>
          <span class="nav-toggle-label">큰글씨모드</span>
          <span class="ios-switch">
            <input type="checkbox" id="btn-large-text">
            <span class="ios-switch-slider"></span>
          </span>
        </label>
        <button class="nav-item logout-btn" id="btn-logout">
          <span class="nav-icon">⏻</span>
          <span>로그아웃</span>
        </button>
      </div>
    </aside>

    <!-- ── Main Panel ─────────────────────────────────────── -->
    <main class="main-panel">
      <!-- Mobile top bar -->
      <div class="mobile-header">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="메뉴 열기">
          <span></span><span></span><span></span>
        </button>
        <span class="mobile-title" id="mobile-title">메이대구</span>
        <button class="chat-toggle-btn" id="chat-toggle-btn" title="채팅 패널">💬</button>
      </div>

      <!-- Filter area (filled per view) -->
      <div class="filter-area" id="filter-area"></div>

      <!-- Content area (filled per view) -->
      <div class="content-area" id="main-content"></div>
    </main>

    <!-- ── Delivery Panel ───────────────────────────────── -->
    <aside class="delivery-panel" id="delivery-panel">
      <div class="dp-header">
        <span>🚚 배송기사 현황</span>
        <button class="dp-refresh-btn" onclick="DeliveryPanel.render()" title="새로고침">↻</button>
      </div>
      <div class="dp-body" id="dp-body"></div>
    </aside>

    <!-- ── Chat Panel ────────────────────────────────────── -->
    <aside class="chat-panel" id="chat-panel">
      <div class="chat-header">💬 메이플라워 채팅방</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="메시지 입력...">
        <button id="chat-send" class="btn btn-primary btn-sm">전송</button>
      </div>

      <!-- ── Delivery Board (배송현황판) ─────────────────── -->
      <section class="delivery-board" id="delivery-board">
        <div class="db-header">
          <span class="db-title">🚚 배송현황판</span>
          <button id="db-add-btn" class="db-add-btn" title="배송현황 추가">+ 추가</button>
        </div>
        <div class="db-body" id="db-body"></div>
      </section>
    </aside>

  </div><!-- /.shell -->

  <!-- Scripts — order matters -->
  <!-- Firebase (compat = 전역 firebase 객체 제공) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-functions-compat.js"></script>
  <script src="js/firebase-config.js?v=52"></script>

  <script src="js/store.js?v=52"></script>
  <script src="js/auth.js?v=52"></script>
  <script src="js/ui.js?v=52"></script>
  <script src="js/api.js?v=52"></script>
  <script src="js/router.js?v=52"></script>
  <script src="js/chat.js?v=52"></script>
  <script src="js/delivery-board.js?v=52"></script>
  <script src="js/naver-maps.js?v=52"></script>
  <script src="js/views/floor2.js?v=52"></script>
  <script src="js/views/floor1.js?v=52"></script>
  <script src="js/views/driver.js?v=52"></script>
  <script src="js/views/admin.js?v=52"></script>

  <script>
    /* ═══════════════════════════════════════════════════════
       AppShell — session guard, nav build, sidebar toggle
    ═══════════════════════════════════════════════════════ */
    const AppShell = {
      _session: null,

      init() {
        const session = Auth.requireAuth();
        if (!session) return; /* redirected to index.html */
        AppShell._session = session;

        AppShell.buildNav(session.role);
        AppShell.bindLogout();
        AppShell.bindSidebar();
        AppShell.bindChatToggle();
        AppShell.bindSidebarCollapse(session);
        AppShell.bindLargeTextToggle(session);

        /* initialise views by role
           NOTE: Floor1View.init must run BEFORE AdminView.init
           so the click/visibilitychange listeners are registered
           before AdminView registers its routes */
        switch (session.role) {
          case 'floor2': Floor2View.init(session); break;
          case 'floor1': Floor1View.init(session); break;
          case 'driver': DriverView.init(session); break;
          case 'admin':
            Floor1View.init(session); /* must be first — registers listeners */
            AdminView.init(session);
            break;
        }

        Router.init();
        Chat.init(session);
        if (typeof DeliveryBoard !== 'undefined') DeliveryBoard.init();
      },

      buildNav(role) {
        const menus = {
          floor2: [
            { icon: '📋', label: '내 주문',    route: 'my-orders' },
            { icon: '✏️', label: '신규 접수',  route: 'new-order' },
          ],
          floor1: [
            { icon: '📦', label: '전체 주문',  route: 'all-orders' },
          ],
          driver: [
            { icon: '🚚', label: '내 배송',    route: 'my-deliveries' },
          ],
          admin: [
            { icon: '📦', label: '전체 주문',       route: 'all-orders' },
            { icon: '👥', label: '사용자 승인',      route: 'manage-users' },
            { icon: '🌸', label: '상품 관리',        route: 'manage-products' },
            { icon: '🚗', label: '기사 관리',        route: 'manage-drivers' },
            { icon: '📊', label: '통계 · 정산',      route: 'statistics' },
          ],
        };

        const nav = document.getElementById('sidebar-nav');
        const session = AppShell._session;
        const items = menus[role] || [];

        nav.innerHTML = `
          <div class="nav-section-label">${UI.ROLE_LABELS[role] || role}</div>
          ${items.map(m => `
            <button class="nav-item" data-route="${m.route}"
              onclick="Router.navigate('${m.route}'); AppShell.closeSidebar()">
              <span class="nav-icon">${m.icon}</span>
              <span>${m.label}</span>
            </button>`).join('')}`;

      },

      bindLogout() {
        document.getElementById('btn-logout').addEventListener('click', async () => {
          const ok = await UI.confirm('로그아웃 하시겠습니까?', '로그아웃');
          if (ok) Auth.logout();
        });
      },

      bindSidebar() {
        const sidebar  = document.getElementById('sidebar');
        const overlay  = document.getElementById('sidebar-overlay');
        const hambBtn  = document.getElementById('hamburger-btn');

        hambBtn.addEventListener('click', () => {
          const open = sidebar.classList.toggle('open');
          overlay.classList.toggle('show', open);
        });
        overlay.addEventListener('click', () => AppShell.closeSidebar());
      },

      closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
      },

      bindSidebarCollapse(session) {
        const STORAGE_KEY = `maydaegu.sidebar.${session.userId}`;
        const shell  = document.querySelector('.shell');
        const btn    = document.getElementById('sidebar-toggle');
        const arrow  = btn.querySelector('.toggle-arrow');

        const applyState = (collapsed) => {
          shell.classList.toggle('sidebar-collapsed', collapsed);
          arrow.textContent = collapsed ? '›' : '‹';
        };

        /* Restore persisted state */
        applyState(localStorage.getItem(STORAGE_KEY) === '1');

        btn.addEventListener('click', () => {
          const collapsed = !shell.classList.contains('sidebar-collapsed');
          applyState(collapsed);
          localStorage.setItem(STORAGE_KEY, collapsed ? '1' : '0');
        });
      },

      bindChatToggle() {
        const panel = document.getElementById('chat-panel');
        document.getElementById('chat-toggle-btn').addEventListener('click', () => {
          panel.classList.toggle('open');
        });
        /* close on outside click (tablet) */
        document.getElementById('sidebar-overlay').addEventListener('click', () => {
          panel.classList.remove('open');
        });
      },

      /* 큰글씨모드 — html.large-text 토글 + localStorage 저장 (디바이스 단위)
         초기 상태는 <head> 인라인 스크립트에서 이미 적용됨 (깜빡임 방지) */
      bindLargeTextToggle(/* session */) {
        const KEY = 'maydaegu.largeText';
        const cb  = document.getElementById('btn-large-text');
        if (!cb) return;
        const apply = (on) => document.documentElement.classList.toggle('large-text', on);

        const saved = localStorage.getItem(KEY) === '1';
        cb.checked = saved;
        apply(saved);

        cb.addEventListener('change', () => {
          const on = cb.checked;
          apply(on);
          localStorage.setItem(KEY, on ? '1' : '0');
        });
      },
    };

    /* ═══════════════════════════════════════════════════════
       DeliveryPanel — 배송기사 현황 패널
    ═══════════════════════════════════════════════════════ */
    const DeliveryPanel = {
      /* RTDB /driverStatus 캐시 (드라이버 Flutter 앱이 기록하는 실시간 상태·GPS) */
      _driverStatus: {},
      _dsSubscribed: false,
      _ensureDriverStatusSubscription() {
        if (DeliveryPanel._dsSubscribed) return;
        if (!window.FirebaseDB) return;
        window.FirebaseDB.ref('driverStatus').on('value', (snap) => {
          DeliveryPanel._driverStatus = snap.val() || {};
          DeliveryPanel.render();
        }, (err) => {
          console.warn('[DeliveryPanel] /driverStatus 구독 에러:', err?.message);
        });
        DeliveryPanel._dsSubscribed = true;
      },

      /* ═════════════════════════════════════════════════════════════
         배송기사 상태 알고리즘 (주문 상태 기반 자동 판정)

         뱃지 자동 결정 (우선순위 순):
           배송중   = delivering(status=3) > 0
           배차완료 = assigned(status 0-2) > 0, delivering=0
           복귀중   = delivering=0, assigned=0, 리셋후 completed(status=4) > 0
           배송대기 = 모두 0 (리셋 직후 또는 당일 활동 없음)

         ⚠️ APP 연동 이후 변경 예정 (현재 미구현):
           [1] 배송중 = 드라이버 APP "배송출발" 버튼 클릭 시 설정
               → 현재는 주문 status=3 으로 대체 감지
           [2] 복귀중 자동 전환 = 배차된 마지막 주문의 배송사진 업로드 시점
               → 현재는 delivering=0 && assigned=0 && completed>0 으로 대체 감지
           [3] 배송대기 자동 전환 = GPS 위치 기반
               (대구 달서구 장기동 666-1 반경 100m 접근)
               → 현재는 admin 수동 "배송대기로 리셋" 버튼 사용
           [4] 드라이버 ID/PW 로그인 + admin 페이지에서 계정 관리
        ════════════════════════════════════════════════════════════ */

      /* 리셋 타임스탬프: 이 시각 이후 updatedAt 주문만 카운트 → 타임라인 초기화 효과 */
      _getResetTs(driverId) {
        return localStorage.getItem(`maydaegu.driver.resetTs.${driverId}`) || '';
      },
      _setResetTs(driverId, ts) {
        localStorage.setItem(`maydaegu.driver.resetTs.${driverId}`, ts);
      },
      _afterReset(order, resetTs) {
        if (!resetTs) return true;
        if (!order.updatedAt) return true;
        return new Date(order.updatedAt) >= new Date(resetTs);
      },

      /* 휴무(off-duty) 상태: 배송대기일 때만 수동 토글 가능 */
      _getOffDuty(driverId) {
        return localStorage.getItem(`maydaegu.driver.offduty.${driverId}`) === '1';
      },
      _setOffDuty(driverId, off) {
        if (off) localStorage.setItem(`maydaegu.driver.offduty.${driverId}`, '1');
        else     localStorage.removeItem(`maydaegu.driver.offduty.${driverId}`);
      },

      /* 공통 뱃지 판정 — render()와 openTimeline()이 공유
         우선순위: /driverStatus.badge 가 있으면 그것 사용, 없으면 주문 기반 계산 */
      _computeBadge(d, allOrders) {
        const resetTs    = DeliveryPanel._getResetTs(d.id);
        const myOrders   = allOrders.filter(o => o.assignedDriverId === d.id);
        const assigned   = myOrders.filter(o => o.status >= 0 && o.status <= 2);
        const delivering = myOrders.filter(o => o.status === 3);
        const completed  = myOrders.filter(o => o.status === 4 && DeliveryPanel._afterReset(o, resetTs));
        const isOff      = DeliveryPanel._getOffDuty(d.id);

        /* driver Flutter 앱이 기록한 실시간 뱃지 우선 */
        const remote = DeliveryPanel._driverStatus[d.id];
        const allowed = ['delivering', 'assigned', 'returning', 'waiting', 'off'];
        if (remote?.badge && allowed.includes(remote.badge)) {
          return { badge: remote.badge, assigned, delivering, completed };
        }

        let badge;
        if (delivering.length > 0)     badge = 'delivering';
        else if (assigned.length > 0)  badge = 'assigned';
        else if (completed.length > 0) badge = 'returning';
        else if (isOff)                badge = 'off';       /* 배송대기 상태에서만 휴무 허용 */
        else                           badge = 'waiting';
        return { badge, assigned, delivering, completed };
      },

      render() {
        const el = document.getElementById('dp-body');
        if (!el) return;

        DeliveryPanel._ensureDriverStatusSubscription();

        const drivers   = Store.getDrivers();
        const allOrders = Store.getOrders();

        if (!drivers.length) {
          el.innerHTML = '<div class="dp-empty">등록된 기사가 없습니다.</div>';
          return;
        }

        /* Build + sort: 배송중(0) → 배차완료(1) → 복귀중(2) → 배송대기(3) → 휴무(4) */
        const data = drivers.map(d => {
          const { badge, assigned, delivering, completed } = DeliveryPanel._computeBadge(d, allOrders);
          const total    = delivering.length + completed.length;
          const pct      = total > 0 ? Math.round((completed.length / total) * 100) : 0;
          const priority = badge === 'delivering' ? 0
                         : badge === 'assigned'   ? 1
                         : badge === 'returning'  ? 2
                         : badge === 'waiting'    ? 3 : 4;
          return { d, assigned, delivering, completed, badge, total, pct, priority };
        }).sort((a, b) => a.priority - b.priority);

        const cards = data.map(({ d, assigned, delivering, completed, badge, total, pct }) => {
          const lastDone = completed
            .filter(o => o.updatedAt)
            .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))[0];
          const lastAddr = lastDone
            ? UI.escHtml((lastDone.deliveryAddress || '').substring(0, 26))
            : '없음';

          const [statusBadge, cardCls] =
            badge === 'delivering' ? [`<span class="dp-badge dp-badge-delivering">배송중</span>`,  'dp-card-active']    :
            badge === 'assigned'   ? [`<span class="dp-badge dp-badge-assigned">배차완료</span>`, 'dp-card-assigned']  :
            badge === 'returning'  ? [`<span class="dp-badge dp-badge-returning">복귀중</span>`,   'dp-card-returning'] :
            badge === 'off'        ? [`<span class="dp-badge dp-badge-off">휴무</span>`,          'dp-card-off']       :
                                     [`<span class="dp-badge dp-badge-waiting">배송대기</span>`,  ''];

          return `
            <div class="dp-driver-card ${cardCls}">
              <div class="dp-card-name-row">
                <button class="dp-driver-name-btn" onclick="DeliveryPanel.openTimeline('${d.id}')" title="타임라인 / 상태 변경">
                  ${UI.escHtml(d.name)}
                </button>
                ${statusBadge}
              </div>
              <div class="dp-card-stats">
                <span class="dp-stat dp-stat-delivering"><span class="dp-stat-num">${delivering.length}</span> 배송중</span>
                <span class="dp-stat dp-stat-done"><span class="dp-stat-num">${completed.length}</span> 완료</span>
              </div>
              <div class="dp-progress-row">
                <div class="dp-progress-wrap">
                  <div class="dp-progress-bar" style="width:${pct}%"></div>
                </div>
                <span class="dp-progress-pct">${pct}%</span>
              </div>
              <div class="dp-last-addr"><span class="dp-meta-icon">📍</span>최종배송지: ${lastAddr}</div>
            </div>`;
        }).join('');

        el.innerHTML = cards;
      },

      openTimeline(driverId) {
        const drivers   = Store.getDrivers();
        const allOrders = Store.getOrders();
        const d = drivers.find(x => String(x.id) === String(driverId));
        if (!d) return;

        const resetTs = DeliveryPanel._getResetTs(driverId);
        const myOrders = allOrders.filter(o => o.assignedDriverId === d.id);

        /* 배송중: status=3 (출발 완료, 운송 중). reset 과 무관하게 현재 진행중인 건은 모두 표시. */
        const delivering = myOrders
          .filter(o => o.status === 3)
          .sort((a, b) => new Date(a.deliveryDatetime || a.assignedAt || a.updatedAt)
                        - new Date(b.deliveryDatetime || b.assignedAt || b.updatedAt));

        /* 배송완료: reset 이후의 완료건만 */
        const completed = myOrders
          .filter(o => o.status === 4 && o.updatedAt && DeliveryPanel._afterReset(o, resetTs))
          .sort((a, b) => new Date(a.updatedAt) - new Date(b.updatedAt));

        const _rowDone = (o) => `
          <div class="dp-tl-item">
            <span class="dp-tl-time">${UI.fmtDatetime(o.updatedAt)}</span>
            <span class="dp-tl-addr">${UI.escHtml(o.deliveryAddress || '')}</span>
            <span class="dp-tl-done">배송완료</span>
          </div>`;

        /* 최종배송지: 가장 최근 완료 주문의 배송지 (없으면 사무실 주소) */
        const OFFICE_ADDR = (window.NaverMaps && window.NaverMaps.OFFICE_ADDRESS) || '대구 달서구 장기동 666-1';
        const finalAddr = (completed.length && completed[completed.length - 1].deliveryAddress)
          ? completed[completed.length - 1].deliveryAddress
          : OFFICE_ADDR;

        /* 배송중 행: "X 까지 Y분 예정" — Y 는 네이버 API 비동기 조회 */
        const _rowIng = (o) => `
          <div class="dp-tl-item dp-tl-item-ing">
            <span class="dp-tl-sentence">
              <span class="dp-tl-addr">${UI.escHtml(o.deliveryAddress || '-')}</span> 까지
              <span class="dp-tl-ing-eta" id="dp-tl-ing-eta-${UI.escHtml(o.id)}">계산 중…</span>
            </span>
          </div>`;

        const sectionDelivering = delivering.length
          ? `<div class="dp-tl-section-title dp-tl-sec-ing">🚚 배송중 <span class="dp-tl-count">${delivering.length}</span></div>
             <div class="dp-tl-group">${delivering.map(_rowIng).join('')}</div>`
          : '';
        const sectionCompleted = completed.length
          ? `<div class="dp-tl-section-title dp-tl-sec-done">✅ 배송완료 <span class="dp-tl-count">${completed.length}</span></div>
             <div class="dp-tl-group">${completed.map(_rowDone).join('')}</div>`
          : '';

        const rows = (sectionDelivering || sectionCompleted)
          ? (sectionDelivering + sectionCompleted)
          : '<p class="dp-tl-empty">진행중이거나 완료된 배송이 없습니다.</p>';

        /* 복귀중(returning) 상태일 때 '사무실 복귀까지' 배너 placeholder */
        const { badge: curBadge } = DeliveryPanel._computeBadge(d, allOrders);
        const etaBanner = curBadge === 'returning'
          ? `<div class="dp-tl-eta" id="dp-tl-eta-${d.id}">🏢 사무실 복귀까지 계산 중…</div>`
          : '';

        const content = `<div class="dp-tl-modal-body" style="pointer-events:none;user-select:text">${etaBanner}${rows}</div>`;

        const overlay = UI.modal({
          title: `🚚 ${UI.escHtml(d.name)} — 배송 타임라인`,
          content,
          confirmText: '닫기',
          cancelText: '',
          size: 'modal-timeline',
        });
        overlay.querySelector('.modal-cancel').style.display = 'none';

        /* 배송중 각 항목의 ETA 계산: 최종배송지(=완료된 마지막건 or 사무실) → 해당 배송지 */
        if (delivering.length && window.NaverMaps) {
          delivering.forEach(o => {
            const elId = `dp-tl-ing-eta-${o.id}`;
            const etaEl = overlay.querySelector(`[id="${elId}"]`);
            if (!etaEl || !o.deliveryAddress) {
              if (etaEl) etaEl.textContent = '소요시간 조회 불가';
              return;
            }
            (async () => {
              try {
                const { durationMs } = await window.NaverMaps.estimateBetweenAddresses(finalAddr, o.deliveryAddress);
                const mins = Math.max(1, Math.round(durationMs / 60000));
                etaEl.textContent = `${mins}분 예정`;
              } catch (e) {
                console.warn('[Timeline ETA] 배송중 ETA 계산 실패:', e);
                etaEl.classList.add('dp-tl-eta-fail');
                etaEl.textContent = '소요시간 계산 불가';
              }
            })();
          });
        }

        /* 복귀 ETA 계산 — 마지막 배송완료 주소 → 사무실 */
        if (curBadge === 'returning' && completed.length && window.NaverMaps) {
          const last = completed[completed.length - 1];
          const etaEl = overlay.querySelector(`#dp-tl-eta-${d.id}`);
          if (etaEl && last.deliveryAddress) {
            (async () => {
              try {
                const { durationMs, distanceM } = await window.NaverMaps.estimateReturnFromAddress(last.deliveryAddress);
                const mins = Math.max(1, Math.round(durationMs / 60000));
                const arrive = new Date(Date.now() + durationMs);
                const hh = String(arrive.getHours()).padStart(2, '0');
                const mm = String(arrive.getMinutes()).padStart(2, '0');
                const km = (distanceM / 1000).toFixed(1);
                etaEl.innerHTML = `🏢 사무실 복귀까지 약 <b>${mins}분</b> 예상 · ${km}km · 도착 예정 ${hh}:${mm}`;
              } catch (e) {
                console.warn('[ETA] 복귀 시간 계산 실패:', e);
                etaEl.classList.add('dp-tl-eta-fail');
                etaEl.innerHTML = '🏢 복귀 시간 계산 불가 (네이버 지도 API 도메인 등록 필요)';
              }
            })();
          }
        }

        const footer = overlay.querySelector('.modal-footer');
        const wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex;gap:0.5rem;margin-right:auto';

        const close = () => { overlay.classList.remove('show'); setTimeout(() => overlay.remove(), 300); };

        if (curBadge === 'waiting' || curBadge === 'off') {
          /* 배송대기 / 휴무 상태: 출근 ↔ 휴무 토글 */
          const isOff = curBadge === 'off';
          wrap.innerHTML = `
            <button class="btn btn-sm ${!isOff ? 'btn-primary' : 'btn-secondary'}" id="dp-btn-on">🚚 출근</button>
            <button class="btn btn-sm ${isOff ? 'btn-warning' : 'btn-secondary'}"  id="dp-btn-off">🏠 휴무</button>`;
          footer.insertBefore(wrap, footer.firstChild);

          wrap.querySelector('#dp-btn-on').addEventListener('click', () => {
            DeliveryPanel._setOffDuty(driverId, false);
            close(); DeliveryPanel.render();
          });
          wrap.querySelector('#dp-btn-off').addEventListener('click', () => {
            DeliveryPanel._setOffDuty(driverId, true);
            close(); DeliveryPanel.render();
          });
        } else {
          /* 배송중 / 배차완료 / 복귀중: 타임라인 초기화 (배송대기로 리셋) */
          /* ⚠️ [3] APP 연동 전 임시: GPS 기반 자동 "배송대기" 전환 대체 */
          wrap.innerHTML = `
            <button class="btn btn-sm btn-warning" id="dp-btn-reset" title="타임라인을 초기화하고 배송대기 상태로 전환 (APP GPS 연동 전 임시 버튼)">🔄 배송대기로 리셋</button>`;
          footer.insertBefore(wrap, footer.firstChild);

          wrap.querySelector('#dp-btn-reset').addEventListener('click', async () => {
            const ok = await UI.confirm(
              `${d.name} 기사의 배송 타임라인을 초기화하고 배송대기 상태로 전환합니다.\n현재 배차된 진행중 주문은 모두 배차 전 상태로 되돌립니다.`,
              '배송대기로 리셋'
            );
            if (!ok) return;
            const btn = wrap.querySelector('#dp-btn-reset');
            if (btn) { btn.disabled = true; btn.textContent = '리셋 중...'; }
            try {
              const { count } = await Api.resetDriverAssignments(driverId);
              DeliveryPanel._setResetTs(driverId, new Date().toISOString());
              close();
              DeliveryPanel.render();
              UI.toast(
                count > 0
                  ? `${d.name} 기사 배송대기로 리셋 (주문 ${count}건 배차 해제)`
                  : `${d.name} 기사 배송대기로 리셋`,
                'success'
              );
            } catch (e) {
              UI.toast(e.message || '리셋 실패', 'error');
              if (btn) { btn.disabled = false; btn.textContent = '🔄 배송대기로 리셋'; }
            }
          });
        }
      },
    };

    /* onAuthStateChanged 복원 후 AppShell 부트 — 새로고침 플래시 방지 */
    (async () => {
      await Auth.waitForReady(3000);
      const session = Auth.getSession();
      if (!session) { window.location.href = 'index.html?error=unauth'; return; }
      /* 드라이버는 모바일 앱 전용 */
      if (session.role === 'driver') {
        await Auth.logout();
        window.location.href = 'index.html?error=driver_only';
        return;
      }

      /* RTDB 구독 시작 — 첫 스냅샷 수신까지 대기 */
      Store.startSubscriptions();
      await Store.whenReady(4000);

      /* 라이브 리렌더: orders 변경 시 현재 뷰와 DeliveryPanel 재렌더 */
      const refreshOrders = () => {
        if (typeof Floor1View !== 'undefined' && Floor1View._loadOrders && document.querySelector('.order-list')) {
          Floor1View._loadOrders();
        }
        if (typeof Floor2View !== 'undefined' && Floor2View._loadMyOrders && document.querySelector('[data-view="floor2"]')) {
          Floor2View._loadMyOrders();
        }
        if (typeof DeliveryPanel !== 'undefined') DeliveryPanel.render();
      };
      Store.onUpdate('orders',  refreshOrders);
      Store.onUpdate('drivers', refreshOrders);

      AppShell.init();
      DeliveryPanel.render();
    })();
  </script>
</body>
</html>
