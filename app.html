<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이대구</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
</head>
<body>

  <!-- Global overlays -->
  <div id="global-loading" style="display:none"><div class="spinner"></div></div>
  <div id="toast-container"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="shell">

    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo">
          <img src="assets/logo.svg" alt="메이대구">
          <span class="sidebar-logo-text">메이대구</span>
          <button class="sidebar-toggle-btn" id="sidebar-toggle" title="메뉴 접기/펼치기">
            <span class="toggle-arrow">‹</span>
          </button>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav">
          <!-- filled by AppShell.buildNav() -->
        </nav>
      </div>
      <div class="sidebar-bottom">
        <button class="nav-item logout-btn" id="btn-logout">
          <span class="nav-icon">⏻</span>
          <span>로그아웃</span>
        </button>
      </div>
    </aside>

    <!-- ── Main Panel ─────────────────────────────────────── -->
    <main class="main-panel">
      <!-- Mobile top bar -->
      <div class="mobile-header">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="메뉴 열기">
          <span></span><span></span><span></span>
        </button>
        <span class="mobile-title" id="mobile-title">메이대구</span>
        <button class="chat-toggle-btn" id="chat-toggle-btn" title="채팅 패널">💬</button>
      </div>

      <!-- Filter area (filled per view) -->
      <div class="filter-area" id="filter-area"></div>

      <!-- Content area (filled per view) -->
      <div class="content-area" id="main-content"></div>
    </main>

    <!-- ── Delivery Panel ───────────────────────────────── -->
    <aside class="delivery-panel" id="delivery-panel">
      <div class="dp-header">🚚 배송기사 현황</div>
      <div class="dp-body" id="dp-body"></div>
      <div class="dp-footer">
        <button class="btn btn-secondary btn-sm" onclick="DeliveryPanel.render()">↻ 새로고침</button>
      </div>
    </aside>

    <!-- ── Chat Panel ────────────────────────────────────── -->
    <aside class="chat-panel" id="chat-panel">
      <div class="chat-profile" id="chat-profile"></div>
      <div class="chat-notice" id="chat-notice"></div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="메시지 입력...">
        <button id="chat-send" class="btn btn-primary btn-sm">전송</button>
      </div>
    </aside>

  </div><!-- /.shell -->

  <!-- Scripts — order matters -->
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/router.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/views/floor2.js"></script>
  <script src="js/views/floor1.js"></script>
  <script src="js/views/driver.js"></script>
  <script src="js/views/admin.js"></script>

  <script>
    /* ═══════════════════════════════════════════════════════
       AppShell — session guard, nav build, sidebar toggle
    ═══════════════════════════════════════════════════════ */
    const AppShell = {
      _session: null,

      init() {
        const session = Auth.requireAuth();
        if (!session) return; /* redirected to index.html */
        AppShell._session = session;

        AppShell.buildNav(session.role);
        AppShell.bindLogout();
        AppShell.bindSidebar();
        AppShell.bindChatToggle();
        AppShell.bindSidebarCollapse(session);

        /* initialise views by role
           NOTE: Floor1View.init must run BEFORE AdminView.init
           so the click/visibilitychange listeners are registered
           before AdminView registers its routes */
        switch (session.role) {
          case 'floor2': Floor2View.init(session); break;
          case 'floor1': Floor1View.init(session); break;
          case 'driver': DriverView.init(session); break;
          case 'admin':
            Floor1View.init(session); /* must be first — registers listeners */
            AdminView.init(session);
            break;
        }

        Router.init();
        Chat.init(session);
      },

      buildNav(role) {
        const menus = {
          floor2: [
            { icon: '📋', label: '내 주문',    route: 'my-orders' },
            { icon: '✏️', label: '신규 접수',  route: 'new-order' },
          ],
          floor1: [
            { icon: '📦', label: '전체 주문',  route: 'all-orders' },
          ],
          driver: [
            { icon: '🚚', label: '내 배송',    route: 'my-deliveries' },
          ],
          admin: [
            { icon: '📦', label: '전체 주문',       route: 'all-orders' },
            { icon: '🌸', label: '상품 관리',        route: 'manage-products' },
            { icon: '🚗', label: '기사 관리',        route: 'manage-drivers' },
            { icon: '📊', label: '통계 · 정산',      route: 'statistics' },
          ],
        };

        const nav = document.getElementById('sidebar-nav');
        const session = AppShell._session;
        const items = menus[role] || [];

        nav.innerHTML = `
          <div class="nav-section-label">${UI.ROLE_LABELS[role] || role}</div>
          ${items.map(m => `
            <button class="nav-item" data-route="${m.route}"
              onclick="Router.navigate('${m.route}'); AppShell.closeSidebar()">
              <span class="nav-icon">${m.icon}</span>
              <span>${m.label}</span>
            </button>`).join('')}`;

      },

      bindLogout() {
        document.getElementById('btn-logout').addEventListener('click', async () => {
          const ok = await UI.confirm('로그아웃 하시겠습니까?', '로그아웃');
          if (ok) Auth.logout();
        });
      },

      bindSidebar() {
        const sidebar  = document.getElementById('sidebar');
        const overlay  = document.getElementById('sidebar-overlay');
        const hambBtn  = document.getElementById('hamburger-btn');

        hambBtn.addEventListener('click', () => {
          const open = sidebar.classList.toggle('open');
          overlay.classList.toggle('show', open);
        });
        overlay.addEventListener('click', () => AppShell.closeSidebar());
      },

      closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
      },

      bindSidebarCollapse(session) {
        const STORAGE_KEY = `maydaegu.sidebar.${session.userId}`;
        const shell  = document.querySelector('.shell');
        const btn    = document.getElementById('sidebar-toggle');
        const arrow  = btn.querySelector('.toggle-arrow');

        const applyState = (collapsed) => {
          shell.classList.toggle('sidebar-collapsed', collapsed);
          arrow.textContent = collapsed ? '›' : '‹';
        };

        /* Restore persisted state */
        applyState(localStorage.getItem(STORAGE_KEY) === '1');

        btn.addEventListener('click', () => {
          const collapsed = !shell.classList.contains('sidebar-collapsed');
          applyState(collapsed);
          localStorage.setItem(STORAGE_KEY, collapsed ? '1' : '0');
        });
      },

      bindChatToggle() {
        const panel = document.getElementById('chat-panel');
        document.getElementById('chat-toggle-btn').addEventListener('click', () => {
          panel.classList.toggle('open');
        });
        /* close on outside click (tablet) */
        document.getElementById('sidebar-overlay').addEventListener('click', () => {
          panel.classList.remove('open');
        });
      },
    };

    /* ═══════════════════════════════════════════════════════
       DeliveryPanel — 배송기사 현황 패널
    ═══════════════════════════════════════════════════════ */
    const DeliveryPanel = {
      render() {
        const el = document.getElementById('dp-body');
        if (!el) return;

        const drivers   = Store.getDrivers();
        const allOrders = Store.getOrders();
        const today     = new Date().toISOString().slice(0, 10);

        if (!drivers.length) {
          el.innerHTML = '<div class="dp-empty">등록된 기사가 없습니다.</div>';
          return;
        }

        const cards = drivers.map(d => {
          const myOrders    = allOrders.filter(o => o.assignedDriverId === d.id);
          const delivering  = myOrders.filter(o => o.status === 3);
          const completedToday = myOrders.filter(o =>
            o.status === 4 && (o.updatedAt || '').slice(0, 10) === today
          );
          const lastDone = myOrders
            .filter(o => o.status === 4 && o.updatedAt)
            .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))[0];

          const isActive   = delivering.length > 0;
          const statusCls  = isActive ? 'dp-status-active' : 'dp-status-idle';
          const statusText = isActive ? `배송중 ${delivering.length}건` : '대기중';

          const lastTime = lastDone
            ? `<span class="dp-last-time">마지막 완료 ${DeliveryPanel._timeAgo(lastDone.updatedAt)}</span>`
            : `<span class="dp-last-time dp-last-none">완료 이력 없음</span>`;

          const deliveringList = delivering.length
            ? `<ul class="dp-delivering-list">${delivering.map(o =>
                `<li><span class="dp-order-id">#${o.id}</span> <span class="dp-order-addr">${UI.escHtml((o.deliveryAddress || '').substring(0, 20))}</span></li>`
              ).join('')}</ul>`
            : '';

          return `
            <div class="dp-driver-card ${isActive ? 'dp-card-active' : ''}">
              <div class="dp-card-top">
                <div class="dp-driver-info">
                  <span class="dp-driver-name">${UI.escHtml(d.name)}</span>
                  <span class="dp-driver-phone">${UI.escHtml(d.phone || '')}</span>
                </div>
                <span class="dp-status-badge ${statusCls}">${statusText}</span>
              </div>
              <div class="dp-card-stats">
                <div class="dp-stat">
                  <span class="dp-stat-val">${delivering.length}</span>
                  <span class="dp-stat-label">배송중</span>
                </div>
                <div class="dp-stat">
                  <span class="dp-stat-val">${completedToday.length}</span>
                  <span class="dp-stat-label">오늘완료</span>
                </div>
              </div>
              ${deliveringList}
              ${lastTime}
            </div>`;
        }).join('');

        el.innerHTML = cards;
      },

      _timeAgo(iso) {
        const diff = Date.now() - new Date(iso).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1)  return '방금 전';
        if (mins < 60) return `${mins}분 전`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24)  return `${hrs}시간 전`;
        return `${Math.floor(hrs / 24)}일 전`;
      },
    };

    AppShell.init();
    DeliveryPanel.render();
  </script>
</body>
</html>
